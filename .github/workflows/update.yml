name: Daily floodline update

on:
  schedule:
    # 12:00 UTC, comfortably after the day's EPSS file and cvelistV5 end-of-day
    # release are published. Adjust if upstream timing shifts.
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: floodline-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/update.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/; then
            echo "No data change; nothing to commit."
            exit 0
          fi
          git add data/floodline.json data/cohorts.json
          git commit -m "data: daily floodline update ($(date -u +%F))"
          for attempt in 1 2 3; do
            if git push; then exit 0; fi
            echo "push failed (attempt $attempt); rebasing on latest main"
            git pull --rebase origin main
          done
          echo "push failed after retries" >&2
          exit 1
